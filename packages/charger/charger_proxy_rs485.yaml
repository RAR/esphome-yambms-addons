# Charger RS485 Proxy - Pylontech protocol responder
# GitHub: https://github.com/RAR/esphome-yambms-addons
#
# Used as a remote package with vars:
#   packages:
#     charger_a:
#       url: https://github.com/RAR/esphome-yambms-addons
#       ref: main
#       files:
#         - path: 'packages/charger/charger_proxy_rs485.yaml'
#           vars:
#             charger_id: 'charger_a'
#             charger_name: 'Charger A'
#             charger_uart_id: 'uart_charger_a'
#             charger_tx_pin: '17'
#             charger_rx_pin: '18'
#             charger_flow_control_pin: '21'
#             charger_baud_rate: '9600'          # optional, default 9600
#             charger_charge_control: 'true'     # optional, default true
#
# Required vars:
#   charger_id:               Unique ID (e.g., 'charger_a')
#   charger_name:             Display name (e.g., 'Charger A')
#   charger_uart_id:          UART ID (e.g., 'uart_charger_a')
#   charger_tx_pin:           UART TX GPIO pin
#   charger_rx_pin:           UART RX GPIO pin
#   charger_flow_control_pin: DE/RE direction control GPIO pin
#
# Optional vars:
#   charger_baud_rate:        UART baud rate (default: '9600')
#   charger_charge_control:   Enable charge control entities and spoofing (default: 'true')
#                             Set to 'false' for monitoring-only (e.g., Solar Assistant)
#
# Also requires ${proxy_id} from top-level substitutions
# (references shared BLE client sensors).
#
# Supported protocols:
#   Pylon: Pylontech RS485 V2 (0x60-0x63) for chargers/inverters (9600 baud)
#   JK:    JK BMS proprietary RS485 protocol (115200 baud)
#   JBD:   JBD/Overkill Solar BMS protocol (9600 baud, capacity limited to 655 Ah)
#   Daly:  Daly BMS UART/RS485 protocol (9600 baud, recommended for monitoring)
# Responds to queries as if it were a battery.

substitutions:
  charger_baud_rate: '9600'
  charger_charge_control: 'true'

globals:
  - id: ${charger_id}_rs485_last_request
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: ${charger_id}_jk_frame_counter
    type: uint8_t
    restore_value: no
    initial_value: "0"

switch:
  - platform: template
    name: "${ charger_name + ' Charge Enable' if charger_charge_control == 'true' else '' }"
    id: ${charger_id}_charge_enable
    icon: "${ 'mdi:battery-charging' if charger_charge_control == 'true' else '' }"
    internal: "${ 'false' if charger_charge_control == 'true' else 'true' }"
    optimistic: true
    restore_mode: "${ 'RESTORE_DEFAULT_ON' if charger_charge_control == 'true' else 'ALWAYS_ON' }"
    entity_category: "${ 'config' if charger_charge_control == 'true' else '' }"

select:
  - platform: template
    name: "${charger_name} RS485 Protocol"
    id: ${charger_id}_rs485_protocol
    options:
      - "Disabled"
      - "Pylon"
      - "JK"
      - "JBD"
      - "Daly"
    restore_value: true
    initial_option: "Pylon"
    optimistic: true
    entity_category: config

binary_sensor:
  - platform: template
    id: ${charger_id}_rs485_status
    name: "${charger_name} RS485 Status"
    entity_category: diagnostic

sensor:
  - platform: template
    id: ${charger_id}_rs485_heartbeat
    name: "${charger_name} RS485 Heartbeat"
    unit_of_measurement: "s"
    accuracy_decimals: 0
    entity_category: diagnostic
  - platform: template
    id: ${charger_id}_sent_cvl
    name: "${ charger_name + ' Sent CVL' if charger_charge_control == 'true' else '' }"
    unit_of_measurement: "V"
    accuracy_decimals: 1
    icon: "mdi:flash"
    internal: "${ 'false' if charger_charge_control == 'true' else 'true' }"
  - platform: template
    id: ${charger_id}_sent_ccl
    name: "${ charger_name + ' Sent CCL' if charger_charge_control == 'true' else '' }"
    unit_of_measurement: "A"
    accuracy_decimals: 1
    icon: "mdi:current-dc"
    internal: "${ 'false' if charger_charge_control == 'true' else 'true' }"

text_sensor:
  - platform: template
    id: ${charger_id}_charge_mode
    name: "${ charger_name + ' Charge Mode' if charger_charge_control == 'true' else '' }"
    icon: "mdi:information-outline"
    entity_category: "${ 'diagnostic' if charger_charge_control == 'true' else '' }"
    internal: "${ 'false' if charger_charge_control == 'true' else 'true' }"

number:
  - platform: template
    name: "${ charger_name + ' CVL Override' if charger_charge_control == 'true' else '' }"
    id: ${charger_id}_cvl_override
    icon: "mdi:flash"
    unit_of_measurement: "V"
    min_value: 0
    max_value: 58
    step: 0.1
    initial_value: 0
    restore_value: true
    optimistic: true
    entity_category: "${ 'config' if charger_charge_control == 'true' else '' }"
    internal: "${ 'false' if charger_charge_control == 'true' else 'true' }"
    mode: box
  - platform: template
    name: "${ charger_name + ' CCL Override' if charger_charge_control == 'true' else '' }"
    id: ${charger_id}_ccl_override
    icon: "mdi:current-dc"
    unit_of_measurement: "A"
    min_value: 0
    max_value: 300
    step: 1
    initial_value: 0
    restore_value: true
    optimistic: true
    entity_category: "${ 'config' if charger_charge_control == 'true' else '' }"
    internal: "${ 'false' if charger_charge_control == 'true' else 'true' }"
    mode: box

interval:
  - interval: 1s
    then:
      - lambda: |-
          uint32_t now = millis();
          if (id(${charger_id}_rs485_last_request) > 0) {
            uint32_t elapsed = (now - id(${charger_id}_rs485_last_request)) / 1000;
            id(${charger_id}_rs485_heartbeat).publish_state(elapsed);
            id(${charger_id}_rs485_status).publish_state(elapsed <= 30);
          }
          std::string mode;
          if (id(${charger_id}_rs485_protocol).active_index() == 0) {
            mode = "Disabled";
          } else if (!id(${proxy_id}_ble_connected).state) {
            mode = "BLE Disconnected";
          } else if (!${charger_charge_control}) {
            mode = "Monitoring";
          } else if (id(${charger_id}_charge_enable).state) {
            mode = "Charging Allowed";
          } else {
            mode = "Charging Blocked";
          }
          if (!id(${charger_id}_charge_mode).has_state() || id(${charger_id}_charge_mode).state != mode) {
            id(${charger_id}_charge_mode).publish_state(mode);
          }

uart:
  - id: ${charger_uart_id}
    tx_pin: ${charger_tx_pin}
    rx_pin: ${charger_rx_pin}
    baud_rate: ${charger_baud_rate}
    rx_buffer_size: 256
    flow_control_pin: ${charger_flow_control_pin}
    debug:
      direction: RX
      dummy_receiver: true
      after:
        delimiter: "\r"
        timeout: 20ms
      sequence:
        - lambda: |-
            if (bytes.size() > 0) {
              std::string ascii;
              for (uint8_t b : bytes) ascii += (b >= 0x20 && b < 0x7F) ? (char)b : '.';
              ESP_LOGD("rs485_rx", "[${charger_id}] %d bytes: %s", bytes.size(), ascii.c_str());
            }

            // Protocol index: 0=Disabled, 1=Pylon, 2=JK
            int proto = id(${charger_id}_rs485_protocol).active_index().value_or(0);
            if (proto == 0) return;
            if (!id(${proxy_id}_ble_connected).state) {
              ESP_LOGW("rs485_rx", "[${charger_id}] BLE not connected, ignoring request");
              return;
            }

            id(${charger_id}_rs485_last_request) = millis();

            // ========== JK BMS Protocol ==========
            // Detect: NW header (4E 57, command 0x06) — SA sends this first, expects
            // a 55 AA EB 90 response within ~1s. The Modbus trigger that follows is
            // a fallback and is ignored.
            bool is_jk_nw = (bytes.size() >= 11 && bytes[0] == 0x4E && bytes[1] == 0x57);
            bool is_jk_modbus = (bytes.size() >= 11 && bytes[1] == 0x10 && bytes[2] == 0x16);
            if (proto == 2 && (is_jk_nw || is_jk_modbus)) {
              ESP_LOGD("proxy_jk", "JK %s request (%d bytes)",
                is_jk_nw ? "NW" : "Modbus", bytes.size());

              float voltage = id(${proxy_id}_voltage).state;
              float current = id(${proxy_id}_current).state;
              float soc_val = id(${proxy_id}_soc).state;
              if (std::isnan(voltage) || std::isnan(current) || std::isnan(soc_val)) {
                ESP_LOGW("proxy_jk", "BLE data not ready, skipping");
                return;
              }

              float soh_val = id(${proxy_id}_soh).state;
              float cyc_val = id(${proxy_id}_charging_cycles).state;
              float max_cell = id(${proxy_id}_max_cell_voltage).state;
              float min_cell = id(${proxy_id}_min_cell_voltage).state;
              float max_temp = id(${proxy_id}_max_temperature).state;
              float min_temp = id(${proxy_id}_min_temperature).state;
              float cap_remain = id(${proxy_id}_capacity_remaining).state;
              float cap_total = id(${proxy_id}_capacity).state;

              if (std::isnan(soh_val)) soh_val = 100.0f;
              if (std::isnan(cyc_val)) cyc_val = 0;
              if (std::isnan(max_cell)) max_cell = voltage / 16.0f;
              if (std::isnan(min_cell)) min_cell = max_cell;
              if (std::isnan(max_temp)) max_temp = 25.0f;
              if (std::isnan(min_temp)) min_temp = max_temp;
              if (std::isnan(cap_remain)) cap_remain = 0;
              if (std::isnan(cap_total)) cap_total = 0;

              // Build 300-byte JK RS485 old protocol response (55 AA EB 90)
              // Real frame is exactly 300 bytes: 4-byte header + 295 payload + 1 checksum
              // Bytes 300-307 in captures are a separate Modbus ACK, NOT part of this frame.
              uint8_t frame[300];
              memset(frame, 0, sizeof(frame));

              // Header: 55 AA EB 90
              frame[0] = 0x55; frame[1] = 0xAA; frame[2] = 0xEB; frame[3] = 0x90;

              // Payload starts at frame[4], offsets below are payload-relative
              uint8_t *p = &frame[4];

              p[0] = 0x02;  // Record type: Cell data
              p[1] = 0x00;  // BMS address (matches real JK captures)

              // Cell voltages (payload offset 2-33): 16 cells × 2 bytes LE
              uint32_t v_mv = (uint32_t)(voltage * 1000);
              uint16_t min_mv = (uint16_t)(min_cell * 1000);
              uint16_t max_mv = (uint16_t)(max_cell * 1000);
              uint16_t avg_mv = (uint16_t)(v_mv / 16);
              // Cell 1 = min, cell 16 = max, cells 2-15 = avg
              p[2] = min_mv & 0xFF; p[3] = (min_mv >> 8) & 0xFF;
              for (int i = 1; i < 15; i++) {
                p[2 + i*2] = avg_mv & 0xFF;
                p[2 + i*2 + 1] = (avg_mv >> 8) & 0xFF;
              }
              p[32] = max_mv & 0xFF; p[33] = (max_mv >> 8) & 0xFF;

              // Total voltage (payload offset 146): u32 LE, mV
              p[146] = v_mv & 0xFF;
              p[147] = (v_mv >> 8) & 0xFF;
              p[148] = (v_mv >> 16) & 0xFF;
              p[149] = (v_mv >> 24) & 0xFF;

              // Current (payload offset 154): i32 LE, mA
              int32_t i_ma = (int32_t)(current * 1000);
              p[154] = i_ma & 0xFF;
              p[155] = (i_ma >> 8) & 0xFF;
              p[156] = (i_ma >> 16) & 0xFF;
              p[157] = (i_ma >> 24) & 0xFF;

              // Temp sensor 1 (payload offset 158): i16 LE, 0.1°C
              int16_t t1 = (int16_t)(min_temp * 10);
              p[158] = t1 & 0xFF; p[159] = (t1 >> 8) & 0xFF;
              // Temp sensor 2 (payload offset 160): i16 LE, 0.1°C
              int16_t t2 = (int16_t)(max_temp * 10);
              p[160] = t2 & 0xFF; p[161] = (t2 >> 8) & 0xFF;

              // Alarms (payload offset 162-164): 24-bit LE
              uint16_t alarms = 0;
              if (!std::isnan(id(${proxy_id}_errors_bitmask_alarm).state))
                alarms = (uint16_t)id(${proxy_id}_errors_bitmask_alarm).state;
              p[162] = alarms & 0xFF;
              p[163] = (alarms >> 8) & 0xFF;
              p[164] = 0;

              // Balance status (payload offset 168): 0=off, 1=charge, 2=discharge
              p[168] = id(${proxy_id}_equalizing).state ? 1 : 0;

              // SOC (payload offset 169): u8, 0-100%
              p[169] = (uint8_t)soc_val;

              // Capacity remaining (payload offset 170): u32 LE, mAh
              uint32_t cap_r_mah = (uint32_t)(cap_remain * 1000);
              p[170] = cap_r_mah & 0xFF;
              p[171] = (cap_r_mah >> 8) & 0xFF;
              p[172] = (cap_r_mah >> 16) & 0xFF;
              p[173] = (cap_r_mah >> 24) & 0xFF;

              // Nominal capacity (payload offset 174): u32 LE, mAh
              uint32_t cap_n_mah = (uint32_t)(cap_total * 1000);
              p[174] = cap_n_mah & 0xFF;
              p[175] = (cap_n_mah >> 8) & 0xFF;
              p[176] = (cap_n_mah >> 16) & 0xFF;
              p[177] = (cap_n_mah >> 24) & 0xFF;

              // Cycle count (payload offset 178): u32 LE
              uint32_t cycles = (uint32_t)cyc_val;
              p[178] = cycles & 0xFF;
              p[179] = (cycles >> 8) & 0xFF;
              p[180] = (cycles >> 16) & 0xFF;
              p[181] = (cycles >> 24) & 0xFF;

              // SOH (payload offset 186): u16 LE, % × 256
              uint16_t soh_enc = (uint16_t)(soh_val * 256);
              p[186] = soh_enc & 0xFF; p[187] = (soh_enc >> 8) & 0xFF;

              // Charge MOSFET (payload offset 194): u8
              p[194] = id(${proxy_id}_charge_enabled).state ? 1 : 0;
              // Discharge MOSFET (payload offset 195): u8
              p[195] = id(${proxy_id}_discharge_enabled).state ? 1 : 0;

              // Temp 3-5 (payload offsets 250, 252, 254)
              int16_t tavg = (int16_t)((min_temp + max_temp) / 2.0f * 10);
              p[250] = tavg & 0xFF; p[251] = (tavg >> 8) & 0xFF;
              p[252] = tavg & 0xFF; p[253] = (tavg >> 8) & 0xFF;
              p[254] = tavg & 0xFF; p[255] = (tavg >> 8) & 0xFF;

              // Checksum at frame[299]: sum of bytes 0-298, low byte
              uint16_t cksum = 0;
              for (int i = 0; i < 299; i++) cksum += frame[i];
              frame[299] = (uint8_t)(cksum & 0xFF);

              ESP_LOGD("proxy_jk", "RS485 frame: 300 bytes, cksum=0x%02X", frame[299]);

              // Send exactly 300 bytes
              id(${charger_uart_id}).write_array(frame, 300);
              ESP_LOGI("proxy_jk", "Sent JK Type02: V=%.1fV I=%.1fA SOC=%u%% SOH=%.0f%%",
                voltage, current, (unsigned)p[169], soh_val);
              return;
            }

            // ========== JBD (Overkill Solar) Protocol ==========
            // Detect: DD A5 03 (basic info) or DD A5 04 (cell voltages)
            // Protocol index 3 = "JBD"
            if (proto == 3 && bytes.size() >= 7 && bytes[0] == 0xDD && bytes[1] == 0xA5) {
              uint8_t reg = bytes[2];
              ESP_LOGD("proxy_jbd", "JBD request reg=0x%02X (%d bytes)", reg, bytes.size());

              float voltage = id(${proxy_id}_voltage).state;
              float current = id(${proxy_id}_current).state;
              float soc_val = id(${proxy_id}_soc).state;
              if (std::isnan(voltage) || std::isnan(current) || std::isnan(soc_val)) {
                ESP_LOGW("proxy_jbd", "BLE data not ready, skipping");
                return;
              }

              // JBD response: DD [reg] [status=00] [len] [data...] [cksum_hi] [cksum_lo] 77
              auto send_jbd = [&](uint8_t cmd, const uint8_t *data, uint8_t data_len) {
                uint8_t resp[128];
                int ri = 0;
                resp[ri++] = 0xDD;
                resp[ri++] = cmd;
                resp[ri++] = 0x00;  // status OK
                resp[ri++] = data_len;
                memcpy(&resp[ri], data, data_len);
                ri += data_len;
                // Checksum: 0x10000 - sum(bytes[2..ri-1]) = ~sum+1
                uint16_t sum = 0;
                for (int i = 2; i < ri; i++) sum += resp[i];
                uint16_t cksum = (~sum + 1) & 0xFFFF;
                resp[ri++] = (cksum >> 8) & 0xFF;
                resp[ri++] = cksum & 0xFF;
                resp[ri++] = 0x77;
                id(${charger_uart_id}).write_array(resp, ri);
              };

              if (reg == 0x03) {
                // Basic info response
                float soh_val = id(${proxy_id}_soh).state;
                float cyc_val = id(${proxy_id}_charging_cycles).state;
                float cap_remain = id(${proxy_id}_capacity_remaining).state;
                float cap_total = id(${proxy_id}_capacity).state;
                float max_temp = id(${proxy_id}_max_temperature).state;
                float min_temp = id(${proxy_id}_min_temperature).state;

                if (std::isnan(soh_val)) soh_val = 100.0f;
                if (std::isnan(cyc_val)) cyc_val = 0;
                if (std::isnan(cap_remain)) cap_remain = 0;
                if (std::isnan(cap_total)) cap_total = 0;
                if (std::isnan(max_temp)) max_temp = 25.0f;
                if (std::isnan(min_temp)) min_temp = max_temp;

                uint8_t data[27];
                memset(data, 0, sizeof(data));

                // [0-1] Total voltage: uint16 BE, 10mV units
                uint16_t v_10mv = (uint16_t)(voltage * 100);
                data[0] = (v_10mv >> 8) & 0xFF; data[1] = v_10mv & 0xFF;

                // [2-3] Current: int16 BE, 10mA units (positive=charge in JBD)
                int16_t i_10ma = (int16_t)(current * 100);
                data[2] = (i_10ma >> 8) & 0xFF; data[3] = i_10ma & 0xFF;

                // [4-5] Remaining capacity, [6-7] Nominal capacity: uint16 BE, 10mAh
                // uint16 max = 65535 (655 Ah). Scale proportionally for large packs
                // so the ratio (and thus SA's calculated SOC) is preserved.
                uint32_t rem_raw = (uint32_t)(cap_remain * 100);
                uint32_t nom_raw = (uint32_t)(cap_total * 100);
                uint32_t max_val = rem_raw > nom_raw ? rem_raw : nom_raw;
                if (max_val > 65535) {
                  float scale = 65535.0f / max_val;
                  rem_raw = (uint32_t)(rem_raw * scale);
                  nom_raw = (uint32_t)(nom_raw * scale);
                }
                data[4] = (rem_raw >> 8) & 0xFF; data[5] = rem_raw & 0xFF;
                data[6] = (nom_raw >> 8) & 0xFF; data[7] = nom_raw & 0xFF;

                // [8-9] Cycle count: uint16 BE
                uint16_t cyc = (uint16_t)cyc_val;
                data[8] = (cyc >> 8) & 0xFF; data[9] = cyc & 0xFF;

                // [10-11] Production date (packed, set to 2024-01-01)
                data[10] = 0x2C; data[11] = 0x21;

                // [12-15] Balance status (uint32 BE, bit per cell) — all zeros = no balancing
                // [16-17] Protection status (uint16 BE bitmask)
                uint16_t alarms = 0;
                if (!std::isnan(id(${proxy_id}_errors_bitmask_alarm).state))
                  alarms = (uint16_t)id(${proxy_id}_errors_bitmask_alarm).state;
                data[16] = (alarms >> 8) & 0xFF; data[17] = alarms & 0xFF;

                // [18] Software version
                data[18] = 0x10;  // v1.0

                // [19] SOC %
                data[19] = (uint8_t)soc_val;

                // [20] FET status: bit0=charge, bit1=discharge
                uint8_t fet = 0;
                if (id(${proxy_id}_charge_enabled).state) fet |= 0x01;
                if (id(${proxy_id}_discharge_enabled).state) fet |= 0x02;
                data[20] = fet;

                // [21] Number of cells
                data[21] = 16;

                // [22] Number of NTC sensors
                data[22] = 2;

                // [23-24] NTC 1: uint16 BE, Kelvin × 10 (e.g. 2981 = 25.1°C)
                uint16_t ntc1 = (uint16_t)((min_temp + 273.15f) * 10);
                data[23] = (ntc1 >> 8) & 0xFF; data[24] = ntc1 & 0xFF;

                // [25-26] NTC 2: uint16 BE
                uint16_t ntc2 = (uint16_t)((max_temp + 273.15f) * 10);
                data[25] = (ntc2 >> 8) & 0xFF; data[26] = ntc2 & 0xFF;

                send_jbd(0x03, data, 27);
                ESP_LOGI("proxy_jbd", "Sent 0x03 Basic: V=%.1fV I=%.1fA SOC=%u%% FET=0x%02X",
                  voltage, current, data[19], fet);
              }
              else if (reg == 0x04) {
                // Cell voltages response: 16 cells × 2 bytes BE (mV)
                float max_cell = id(${proxy_id}_max_cell_voltage).state;
                float min_cell = id(${proxy_id}_min_cell_voltage).state;
                if (std::isnan(max_cell)) max_cell = voltage / 16.0f;
                if (std::isnan(min_cell)) min_cell = max_cell;

                uint16_t avg_mv = (uint16_t)(voltage * 1000 / 16);
                uint16_t min_mv = (uint16_t)(min_cell * 1000);
                uint16_t max_mv = (uint16_t)(max_cell * 1000);

                uint8_t data[32];  // 16 cells × 2 bytes
                for (int c = 0; c < 16; c++) {
                  uint16_t cv = avg_mv;
                  if (c == 0) cv = min_mv;
                  if (c == 15) cv = max_mv;
                  data[c*2] = (cv >> 8) & 0xFF;
                  data[c*2 + 1] = cv & 0xFF;
                }
                send_jbd(0x04, data, 32);
                ESP_LOGI("proxy_jbd", "Sent 0x04 Cells: min=%umV avg=%umV max=%umV",
                  min_mv, avg_mv, max_mv);
              }
              else {
                ESP_LOGD("proxy_jbd", "Unknown JBD register: 0x%02X", reg);
              }
              return;
            }

            // ========== Daly BMS Protocol ==========
            // Detect: A5 40 [CMD] 08 ... (13-byte fixed frames, 9600 baud)
            // Protocol index 4 = "Daly"
            if (proto == 4 && bytes.size() >= 13) {
              // Process ALL Daly frames in buffer — SA retries rapidly and
              // the UART debug delivers them as one chunk
              int last_cmd = -1;
              for (int pos = 0; pos + 12 < bytes.size(); pos++) {
                if (bytes[pos] != 0xA5 || bytes[pos+1] != 0x40 || bytes[pos+3] != 0x08) continue;
                last_cmd = bytes[pos+2];
                pos += 12;  // skip to end of this 13-byte frame
              }
              if (last_cmd < 0) return;  // not a Daly frame
              // Respond to the last command seen (most likely to be in SA's receive window)
              uint8_t cmd = (uint8_t)last_cmd;
              ESP_LOGD("proxy_daly", "Daly request cmd=0x%02X (%d bytes in buffer)", cmd, bytes.size());

              float voltage = id(${proxy_id}_voltage).state;
              float current = id(${proxy_id}_current).state;
              float soc_val = id(${proxy_id}_soc).state;
              if (std::isnan(voltage) || std::isnan(current) || std::isnan(soc_val)) {
                ESP_LOGW("proxy_daly", "BLE data not ready");
                return;
              }

              // Daly response: A5 01 [CMD] 08 [8 data bytes] [checksum]
              auto send_daly = [&](uint8_t cmd, const uint8_t data[8]) {
                uint8_t resp[13];
                resp[0] = 0xA5;
                resp[1] = 0x01;  // BMS address
                resp[2] = cmd;
                resp[3] = 0x08;
                memcpy(&resp[4], data, 8);
                uint8_t cksum = 0;
                for (int i = 0; i < 12; i++) cksum += resp[i];
                resp[12] = cksum;
                id(${charger_uart_id}).write_array(resp, 13);
              };

              uint8_t d[8];
              memset(d, 0, 8);

              // 0x90: Voltage, Current, SOC
              if (cmd == 0x90) {
                uint16_t v_raw = (uint16_t)(voltage * 10);  // 0.1V
                d[0] = (v_raw >> 8) & 0xFF; d[1] = v_raw & 0xFF;
                d[2] = d[0]; d[3] = d[1];  // gather voltage = pack voltage
                // Current: 30000 = 0A, >30000 = discharge, <30000 = charge
                // YamBMS: positive = charge, negative = discharge
                // SA displays >30000 as positive, so flip sign to match
                uint16_t i_raw = (uint16_t)(30000 + (int16_t)(current * 10));
                d[4] = (i_raw >> 8) & 0xFF; d[5] = i_raw & 0xFF;
                uint16_t soc_raw = (uint16_t)(soc_val * 10);  // 0.1%
                d[6] = (soc_raw >> 8) & 0xFF; d[7] = soc_raw & 0xFF;
                send_daly(0x90, d);
                ESP_LOGI("proxy_daly", "0x90: V=%.1fV I=%.1fA SOC=%.1f%%", voltage, current, soc_val);
              }
              // 0x91: Min/Max cell voltage
              else if (cmd == 0x91) {
                float max_cell = id(${proxy_id}_max_cell_voltage).state;
                float min_cell = id(${proxy_id}_min_cell_voltage).state;
                if (std::isnan(max_cell)) max_cell = voltage / 16.0f;
                if (std::isnan(min_cell)) min_cell = max_cell;
                uint16_t max_mv = (uint16_t)(max_cell * 1000);
                uint16_t min_mv = (uint16_t)(min_cell * 1000);
                d[0] = (max_mv >> 8) & 0xFF; d[1] = max_mv & 0xFF;
                d[2] = 16;  // cell number with max
                d[3] = (min_mv >> 8) & 0xFF; d[4] = min_mv & 0xFF;
                d[5] = 1;   // cell number with min
                send_daly(0x91, d);
                ESP_LOGD("proxy_daly", "0x91: max=%umV min=%umV", max_mv, min_mv);
              }
              // 0x92: Min/Max temperature
              else if (cmd == 0x92) {
                float max_temp = id(${proxy_id}_max_temperature).state;
                float min_temp = id(${proxy_id}_min_temperature).state;
                if (std::isnan(max_temp)) max_temp = 25.0f;
                if (std::isnan(min_temp)) min_temp = max_temp;
                d[0] = (uint8_t)(max_temp + 40);  // +40 offset
                d[1] = 1;  // sensor number
                d[2] = (uint8_t)(min_temp + 40);
                d[3] = 2;
                send_daly(0x92, d);
                ESP_LOGD("proxy_daly", "0x92: max=%.1f min=%.1f", max_temp, min_temp);
              }
              // 0x93: MOS status + remaining capacity (uint32 mAh)
              else if (cmd == 0x93) {
                float cap_remain = id(${proxy_id}_capacity_remaining).state;
                if (std::isnan(cap_remain)) cap_remain = 0;
                // Status: 0=stationary, 1=charging, 2=discharging
                if (current > 0.5f) d[0] = 1;
                else if (current < -0.5f) d[0] = 2;
                else d[0] = 0;
                d[1] = id(${proxy_id}_charge_enabled).state ? 1 : 0;
                d[2] = id(${proxy_id}_discharge_enabled).state ? 1 : 0;
                d[3] = id(${charger_id}_jk_frame_counter)++;  // heartbeat
                // Remaining capacity: uint32 BE, mAh
                uint32_t rem_mah = (uint32_t)(cap_remain * 1000);
                d[4] = (rem_mah >> 24) & 0xFF;
                d[5] = (rem_mah >> 16) & 0xFF;
                d[6] = (rem_mah >> 8) & 0xFF;
                d[7] = rem_mah & 0xFF;
                send_daly(0x93, d);
                ESP_LOGI("proxy_daly", "0x93: status=%u rem=%.0fAh", d[0], cap_remain);
              }
              // 0x94: Battery status / cell count
              else if (cmd == 0x94) {
                float cyc_val = id(${proxy_id}_charging_cycles).state;
                if (std::isnan(cyc_val)) cyc_val = 0;
                d[0] = 16;  // cell count
                d[1] = 2;   // temp sensor count
                d[2] = (current > 0.5f) ? 1 : 0;  // charger running
                d[3] = (current < -0.5f) ? 1 : 0;  // load running
                uint16_t cyc = (uint16_t)cyc_val;
                d[5] = (cyc >> 8) & 0xFF; d[6] = cyc & 0xFF;
                send_daly(0x94, d);
                ESP_LOGD("proxy_daly", "0x94: cells=16 temps=2 cycles=%u", cyc);
              }
              // 0x95: Cell voltages (multi-frame, 3 cells per frame)
              else if (cmd == 0x95) {
                float max_cell = id(${proxy_id}_max_cell_voltage).state;
                float min_cell = id(${proxy_id}_min_cell_voltage).state;
                if (std::isnan(max_cell)) max_cell = voltage / 16.0f;
                if (std::isnan(min_cell)) min_cell = max_cell;
                uint16_t avg_mv = (uint16_t)(voltage * 1000 / 16);
                uint16_t min_mv = (uint16_t)(min_cell * 1000);
                uint16_t max_mv = (uint16_t)(max_cell * 1000);
                // 16 cells = 6 frames (ceil(16/3))
                for (int f = 0; f < 6; f++) {
                  memset(d, 0, 8);
                  d[0] = f + 1;  // frame number (1-indexed)
                  for (int s = 0; s < 3; s++) {
                    int cell = f * 3 + s;
                    if (cell >= 16) break;
                    uint16_t cv = avg_mv;
                    if (cell == 0) cv = min_mv;
                    if (cell == 15) cv = max_mv;
                    d[1 + s*2] = (cv >> 8) & 0xFF;
                    d[2 + s*2] = cv & 0xFF;
                  }
                  send_daly(0x95, d);
                }
                ESP_LOGD("proxy_daly", "0x95: sent 6 cell voltage frames");
              }
              // 0x96: Cell temperatures (multi-frame, 7 temps per frame)
              else if (cmd == 0x96) {
                float max_temp = id(${proxy_id}_max_temperature).state;
                float min_temp = id(${proxy_id}_min_temperature).state;
                if (std::isnan(max_temp)) max_temp = 25.0f;
                if (std::isnan(min_temp)) min_temp = max_temp;
                memset(d, 0, 8);
                d[0] = 1;  // frame 1
                d[1] = (uint8_t)(min_temp + 40);
                d[2] = (uint8_t)(max_temp + 40);
                send_daly(0x96, d);
                ESP_LOGD("proxy_daly", "0x96: sent temp frame");
              }
              // 0x97: Balance state
              else if (cmd == 0x97) {
                // All zeros = no balancing (or set bits if equalizing)
                send_daly(0x97, d);
              }
              // 0x98: Alarms
              else if (cmd == 0x98) {
                uint16_t alarms = 0;
                if (!std::isnan(id(${proxy_id}_errors_bitmask_alarm).state))
                  alarms = (uint16_t)id(${proxy_id}_errors_bitmask_alarm).state;
                d[0] = alarms & 0xFF;        // voltage alarms
                d[1] = (alarms >> 8) & 0xFF;  // temp alarms
                send_daly(0x98, d);
                ESP_LOGD("proxy_daly", "0x98: alarms=0x%04X", alarms);
              }
              else {
                ESP_LOGD("proxy_daly", "Unknown Daly cmd: 0x%02X", cmd);
              }
              return;
            }

            // ========== Pylontech Protocol ==========
            if (proto != 1) return;
            if (bytes.size() < 18) return;
            if (bytes[0] != 0x7E) return;

            char cid2[3] = { (char)bytes[7], (char)bytes[8], 0 };
            ESP_LOGD("proxy_rs485", "Pylon request CID2=%s (%d bytes)", cid2, bytes.size());

            auto calc_length = [](int len) -> std::string {
              uint8_t n1 = (len >> 8) & 0x0F;
              uint8_t n2 = (len >> 4) & 0x0F;
              uint8_t n3 = len & 0x0F;
              uint8_t lchk = (~(n1 + n2 + n3) & 0x0F) + 1;
              char buf[5];
              snprintf(buf, sizeof(buf), "%1X%03X", lchk & 0x0F, len);
              return std::string(buf);
            };

            auto calc_checksum = [](const std::string &data) -> std::string {
              uint16_t sum = 0;
              for (char c : data) sum += (uint8_t)c;
              sum = (~sum + 1) & 0xFFFF;
              char buf[5];
              snprintf(buf, sizeof(buf), "%04X", sum);
              return std::string(buf);
            };

            auto send_frame = [&](const std::string &info) {
              std::string len_field = calc_length(info.length());
              std::string frame_data = std::string("20024600") + len_field + info;
              std::string checksum = calc_checksum(frame_data);
              std::string full = "~" + frame_data + checksum + "\r";
              id(${charger_uart_id}).write_str(full.c_str());
            };

            bool charge_ok = ${charger_charge_control} ? id(${charger_id}_charge_enable).state : true;

            // 0x60: Battery Pack Info
            if (cid2[0] == '6' && cid2[1] == '0') {
              char info[65];
              int pos = 0;
              const char* dev_name = "US2000C   ";
              const char* mfr_name = "Pylontech           ";
              for (int i = 0; i < 10; i++)
                pos += snprintf(info + pos, sizeof(info) - pos, "%02X", (uint8_t)dev_name[i]);
              pos += snprintf(info + pos, sizeof(info) - pos, "%02X%02X", 1, 10);
              for (int i = 0; i < 20; i++)
                pos += snprintf(info + pos, sizeof(info) - pos, "%02X", (uint8_t)mfr_name[i]);
              send_frame(std::string(info));
              ESP_LOGD("proxy_rs485", "Sent 0x60 Pack Info");
            }

            // 0x61: Analog Data
            else if (cid2[0] == '6' && cid2[1] == '1') {
              float voltage = id(${proxy_id}_voltage).state;
              float current = id(${proxy_id}_current).state;
              float real_soc = id(${proxy_id}_soc).state;
              float soh_val = id(${proxy_id}_soh).state;
              float cyc_val = id(${proxy_id}_charging_cycles).state;
              float max_cell = id(${proxy_id}_max_cell_voltage).state;
              float min_cell = id(${proxy_id}_min_cell_voltage).state;
              float max_temp = id(${proxy_id}_max_temperature).state;
              float min_temp = id(${proxy_id}_min_temperature).state;

              if (std::isnan(voltage) || std::isnan(current) || std::isnan(real_soc)) return;

              if (std::isnan(soh_val)) soh_val = 100.0f;
              if (std::isnan(cyc_val)) cyc_val = 0;
              if (std::isnan(max_cell)) max_cell = voltage / 16.0f;
              if (std::isnan(min_cell)) min_cell = max_cell;
              if (std::isnan(max_temp)) max_temp = 25.0f;
              if (std::isnan(min_temp)) min_temp = max_temp;

              float reported_soc = charge_ok ? real_soc : 100.0f;

              uint16_t v_mv = (uint16_t)(voltage * 1000);
              int16_t i_signed = (int16_t)(current * 100);
              uint16_t i_ca = (uint16_t)i_signed;
              uint8_t soc_pct = (uint8_t)reported_soc;
              uint16_t cyc = (uint16_t)cyc_val;
              uint8_t soh = (uint8_t)soh_val;
              uint16_t max_cv = (uint16_t)(max_cell * 1000);
              uint16_t min_cv = (uint16_t)(min_cell * 1000);
              float avg_temp = (max_temp + min_temp) / 2.0f;
              uint16_t avg_t_dk = (uint16_t)((avg_temp + 273.15f) * 10);
              uint16_t max_t_dk = (uint16_t)((max_temp + 273.15f) * 10);
              uint16_t min_t_dk = (uint16_t)((min_temp + 273.15f) * 10);

              char info[99];
              snprintf(info, sizeof(info),
                "%04X%04X%02X%04X%04X%02X%02X"
                "%04X%04X%04X%04X"
                "%04X%04X%04X%04X%04X"
                "%04X%04X%04X%04X%04X"
                "%04X%04X%04X%04X%04X",
                v_mv, i_ca, soc_pct, cyc, cyc, soh, soh,
                max_cv, 0x0101, min_cv, 0x0108,
                avg_t_dk, max_t_dk, 0x0103, min_t_dk, 0x0109,
                avg_t_dk, max_t_dk, 0x0101, min_t_dk, 0x0101,
                avg_t_dk, max_t_dk, 0x0101, min_t_dk, 0x0101);
              send_frame(std::string(info));
              ESP_LOGD("proxy_rs485", "Sent 0x61: V=%.1f I=%.1f SOC=%.0f%s",
                voltage, current, reported_soc, charge_ok ? "" : " [SPOOFED]");
            }

            // 0x62: Alarm Info
            else if (cid2[0] == '6' && cid2[1] == '2') {
              uint16_t alarms = 0;
              uint16_t warnings = 0;
              if (!std::isnan(id(${proxy_id}_errors_bitmask_alarm).state))
                alarms = (uint16_t)id(${proxy_id}_errors_bitmask_alarm).state;
              if (!std::isnan(id(${proxy_id}_errors_bitmask_warning).state))
                warnings = (uint16_t)id(${proxy_id}_errors_bitmask_warning).state;

              uint8_t alarm1 = (uint8_t)(alarms & 0xFF);
              uint8_t alarm2 = (uint8_t)((alarms >> 8) & 0xFF);
              uint8_t prot1 = (uint8_t)(warnings & 0xFF);
              uint8_t prot2 = (uint8_t)((warnings >> 8) & 0xFF);

              char info[9];
              snprintf(info, sizeof(info), "%02X%02X%02X%02X", alarm1, alarm2, prot1, prot2);
              send_frame(std::string(info));
              ESP_LOGD("proxy_rs485", "Sent 0x62 Alarms: %s", info);
            }

            // 0x63: Charge/Discharge Management
            else if (cid2[0] == '6' && cid2[1] == '3') {
              float real_cvl = id(${proxy_id}_charge_voltage).state;
              float real_ccl = id(${proxy_id}_charge_current).state;
              float dvl = id(${proxy_id}_discharge_voltage).state;
              float dcl = id(${proxy_id}_discharge_current).state;
              float voltage = id(${proxy_id}_voltage).state;

              if (std::isnan(real_cvl) || std::isnan(real_ccl) ||
                  std::isnan(dvl) || std::isnan(dcl) || std::isnan(voltage)) return;

              float reported_cvl = real_cvl;
              float reported_ccl = real_ccl;
              uint8_t status_byte = 0;

              if (id(${proxy_id}_charge_enabled).state)
                status_byte |= (1 << 7);
              if (id(${proxy_id}_discharge_enabled).state)
                status_byte |= (1 << 6);
              if (id(${proxy_id}_force_charge).state)
                status_byte |= (1 << 5);

              // Apply CVL/CCL overrides (0 = use BMS value)
              float cvl_ovr = 0;
              float ccl_ovr = 0;
              if (${charger_charge_control}) {
                cvl_ovr = id(${charger_id}_cvl_override).state;
                ccl_ovr = id(${charger_id}_ccl_override).state;
                if (!std::isnan(cvl_ovr) && cvl_ovr > 0) reported_cvl = cvl_ovr;
                if (!std::isnan(ccl_ovr) && ccl_ovr > 0) reported_ccl = ccl_ovr;
              }

              if (!charge_ok) {
                reported_cvl = voltage;
                reported_ccl = 0.0f;
                status_byte &= ~(1 << 7);
                status_byte &= ~(1 << 5);
              }

              uint16_t cvl_mv = (uint16_t)(reported_cvl * 1000);
              uint16_t dvl_mv = (uint16_t)(dvl * 1000);
              uint16_t ccl_da = (uint16_t)(reported_ccl * 10);
              uint16_t dcl_da = (uint16_t)(dcl * 10);

              char info[19];
              snprintf(info, sizeof(info), "%04X%04X%04X%04X%02X",
                cvl_mv, dvl_mv, ccl_da, dcl_da, status_byte);
              send_frame(std::string(info));
              if (${charger_charge_control}) {
                id(${charger_id}_sent_cvl).publish_state(reported_cvl);
                id(${charger_id}_sent_ccl).publish_state(reported_ccl);
              }
              ESP_LOGI("proxy_rs485", "Sent 0x63: CVL=%.1f CCL=%.1f %s%s",
                reported_cvl, reported_ccl,
                charge_ok ? "CHARGE ON" : "CHARGE BLOCKED",
                (cvl_ovr > 0 || ccl_ovr > 0) ? " [OVERRIDE]" : "");
            }
            else {
              ESP_LOGD("proxy_rs485", "Unknown Pylon command: %s", cid2);
            }
